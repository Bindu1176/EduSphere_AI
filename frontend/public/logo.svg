<svg width="200" height="48" viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Planet orbit circle -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
  <!-- Graduation cap -->
  <polygon points="24,10 36,17 24,24 12,17" fill="url(#logoGrad)"/>
  <rect x="33" y="17" width="2" height="8" fill="#7C3AED"/>
  <!-- Orbit ring -->
  <ellipse cx="24" cy="24" rx="22" ry="8" fill="none" stroke="#06B6D4" stroke-width="1.5" transform="rotate(-30 24 24)"/>
  <!-- Text -->
  <text x="52" y="30" font-family="Poppins, sans-serif" font-weight="700" font-size="20" fill="#4F46E5">EduSphere</text>
</svg>
